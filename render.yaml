# Render Blueprint — provisions one web service + one managed Postgres.
# Deploy with: https://render.com/deploy?repo=https://github.com/Jxredkong/ogp-url-shortener
databases:
  - name: ogp-url-shortener-db
    databaseName: ogp_url_shortener
    plan: free

services:
  - type: web
    name: ogp-url-shortener
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ACCESS_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ogp-url-shortener-db
          property: connectionString
